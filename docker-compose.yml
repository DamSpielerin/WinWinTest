services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 10

  data-api:
    build:
      context: ./data-api
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    ports:
      - "8081:8081"

  auth-api:
    build:
      context: ./auth-api
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/appdb
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      DATA_API_URL: http://data-api:8081
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      data-api:
        condition: service_started

volumes:
  postgres-data:
