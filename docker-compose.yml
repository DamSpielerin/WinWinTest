services:
  postgres:
    networks:
      - db_network
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-appdb}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apppass}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 10

  data-api:
    networks:
      - app_network
    build:
      context: ./data-api
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-dev-internal-token}
    ports:
      - "8081:8081"

  auth-api:
    networks:
      - app_network
      - db_network
    build:
      context: ./auth-api
    environment:
      POSTGRES_URL: ${POSTGRES_URL:-jdbc:postgresql://postgres:5432/appdb}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apppass}
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-change-me}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-dev-internal-token}
      DATA_API_URL: ${DATA_API_URL:-http://data-api:8081}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      data-api:
        condition: service_started

volumes:
  postgres-data:

networks:
  app_network:
    driver: bridge
  db_network:
    driver: bridge
